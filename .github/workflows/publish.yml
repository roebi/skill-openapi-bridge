name: publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Sigstore / Trusted Publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Audit dependencies
        run: |
          uv pip install --no-cache "pip-audit==2.10.0"
          pip-audit --skip-editable
          uv pip uninstall pip-audit

      - name: Build
        run: uv build

      - name: Publish to PyPI (Trusted Publishing + Sigstore provenance)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          attestations: true
